blueprint:
  name: "Gibbon's Alexa Door Announcer v1.5`"
  description: >
    Announce when doors are OPENED and/or CLOSED. 
    You can independently toggle alerts for opening and shutting, and set different sounds or messages for each state.
  domain: automation
  input:
    trigger_sensors:
      name: Door Sensors
      description: Select your door/window contact sensors or Doorbell entities.
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    echo_devices:
      name: Alexa Devices
      description: Select one or more Echo devices to play the announcements.
      selector:
        entity:
          domain: media_player
          multiple: true
    announcement_volume:
      name: Announcement Volume
      description: 0 to 1. Set to 0 to keep the speaker's current volume.
      default: 0.5
      selector:
        number:
          min: 0
          max: 1
          step: 0.05
          mode: slider

    # ===============================
    # OPEN ALERT SETTINGS (to: 'on')
    # ===============================
    enable_open_alert:
      name: "[OPEN] Enable Alert"
      description: "Trigger an announcement when the door OPENS."
      default: true
      selector:
        boolean: {}
    open_type:
      name: "[OPEN] Announcement Type"
      default: "tts"
      selector:
        select:
          options:
            - label: "Voice Message (TTS)"
              value: "tts"
            - label: "Amazon Library Sound"
              value: "sound"
    open_tts_message:
      name: "[OPEN] Voice Message"
      default: "A door has been opened."
      selector:
        text:
    open_sound_preset:
      name: "[OPEN] Sound Preset"
      default: "soundbank://soundlibrary/home/amzn_sfx_doorbell_chime_01"
      selector:
        select:
          options:
            - label: "Standard Doorbell 1"
              value: "soundbank://soundlibrary/home/amzn_sfx_doorbell_chime_01"
            - label: "Classic Doorbell 2"
              value: "soundbank://soundlibrary/home/amzn_sfx_doorbell_chime_02"
            - label: "Sci-Fi Chime"
              value: "soundbank://soundlibrary/scifi/amzn_sfx_scifi_doorbell_01"
            - label: "--- USE CUSTOM URI BELOW ---"
              value: "custom"
    open_sound_uri:
      name: "[OPEN] Custom Amazon Sound URI"
      default: "soundbank://soundlibrary/animals/amzn_sfx_bear_groan_roar_01"
      selector:
        text:

    # ===============================
    # CLOSE ALERT SETTINGS (to: 'off')
    # ===============================
    enable_close_alert:
      name: "[CLOSE] Enable Alert"
      description: "Trigger an announcement when the door is SHUT. NOT Recommended for Doorbells"
      default: false
      selector:
        boolean: {}
    close_type:
      name: "[CLOSE] Announcement Type"
      default: "tts"
      selector:
        select:
          options:
            - label: "Voice Message (TTS)"
              value: "tts"
            - label: "Amazon Library Sound"
              value: "sound"
    close_tts_message:
      name: "[CLOSE] Voice Message"
      default: "The door is now shut."
      selector:
        text:
    close_sound_preset:
      name: "[CLOSE] Sound Preset"
      default: "soundbank://soundlibrary/home/amzn_sfx_doorbell_chime_02"
      selector:
        select:
          options:
            - label: "Standard Doorbell 1"
              value: "soundbank://soundlibrary/home/amzn_sfx_doorbell_chime_01"
            - label: "Classic Doorbell 2"
              value: "soundbank://soundlibrary/home/amzn_sfx_doorbell_chime_02"
            - label: "Sci-Fi Chime"
              value: "soundbank://soundlibrary/scifi/amzn_sfx_scifi_doorbell_01"
            - label: "--- USE CUSTOM URI BELOW ---"
              value: "custom"
    close_sound_uri:
      name: "[CLOSE] Custom Amazon Sound URI"
      default: "soundbank://soundlibrary/magic/amzn_sfx_magic_blast_1x_01"
      selector:
        text:

variables:
  v_devices: !input echo_devices
  v_volume: !input announcement_volume
  
  v_enable_open: !input enable_open_alert
  v_open_type: !input open_type
  v_open_message: !input open_tts_message
  v_open_preset: !input open_sound_preset
  v_open_uri: !input open_sound_uri
  
  v_enable_close: !input enable_close_alert
  v_close_type: !input close_type
  v_close_message: !input close_tts_message
  v_close_preset: !input close_sound_preset
  v_close_uri: !input close_sound_uri

mode: parallel
max: 10

trigger:
  # Trigger 1: Door Opens
  - platform: state
    entity_id: !input trigger_sensors
    to: "on"
    id: "door_opened"
  # Trigger 2: Door Closes
  - platform: state
    entity_id: !input trigger_sensors
    to: "off"
    id: "door_closed"

action:
  - choose:
      # -----------------------------------
      # LOGIC IF THE DOOR WAS OPENED
      # -----------------------------------
      - conditions:
          - condition: trigger
            id: "door_opened"
          - condition: template
            value_template: "{{ v_enable_open }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ v_volume | float > 0 }}"
            then:
              - service: media_player.volume_set
                target:
                  entity_id: "{{ v_devices }}"
                data:
                  volume_level: "{{ v_volume | float }}"
          - service: notify.alexa_media
            data:
              target: "{{ v_devices }}"
              data:
                type: tts
              message: >
                {% if v_open_type == 'tts' %}
                  {{ v_open_message }}
                {% else %}
                  {% if v_open_preset == 'custom' %}
                    <audio src='{{ v_open_uri }}'/>
                  {% else %}
                    <audio src='{{ v_open_preset }}'/>
                  {% endif %}
                {% endif %}

      # -----------------------------------
      # LOGIC IF THE DOOR WAS CLOSED
      # -----------------------------------
      - conditions:
          - condition: trigger
            id: "door_closed"
          - condition: template
            value_template: "{{ v_enable_close }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ v_volume | float > 0 }}"
            then:
              - service: media_player.volume_set
                target:
                  entity_id: "{{ v_devices }}"
                data:
                  volume_level: "{{ v_volume | float }}"
          - service: notify.alexa_media
            data:
              target: "{{ v_devices }}"
              data:
                type: tts
              message: >
                {% if v_close_type == 'tts' %}
                  {{ v_close_message }}
                {% else %}
                  {% if v_close_preset == 'custom' %}
                    <audio src='{{ v_close_uri }}'/>
                  {% else %}
                    <audio src='{{ v_close_preset }}'/>
                  {% endif %}
                {% endif %}
